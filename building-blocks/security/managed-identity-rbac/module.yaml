name: managed-identity-rbac
type: security
category: identity
status: active
purpose: Reference pattern for least-privilege identity and RBAC in Azure.
description: >
  This building block defines the standard for secure service-to-service authentication using
  Managed Identities and Azure RBAC. It enforces a strict "no-secrets" policy by leveraging
  Microsoft Entra ID. Wildcard permissions (*), Owner, and Contributor roles
  are strictly forbidden in favor of specific Data Plane roles.
inputs:
  - name: workload_name
    type: string
    description: Name of the workload for identity naming.
  - name: target_resource_id
    type: string
    description: The fully qualified Azure Resource ID of the target resource for RBAC assignment.
  - name: role_definition_name
    type: string
    description: The name of the built-in Azure RBAC role to assign (e.g., 'Storage Blob Data Reader').
outputs:
  - name: principal_id
    type: string
    description: The Principal ID of the created Managed Identity.
  - name: client_id
    type: string
    description: The Client ID of the created User-Assigned Managed Identity.
  - name: role_assignment_id
    type: string
    description: The ID of the created Role Assignment.
dependencies:
  - name: azure-identity
    type: sdk
    version: "^1.12.0"
azure_resources:
  - Microsoft Entra Managed Identity (User-Assigned)
  - Azure RBAC Role Assignment
security_boundary:
  policy: "Least-privilege Managed Identity access only"
  forbid_wildcards: true
  forbid_secrets: true
  recommended_roles:
    - role: "Storage Blob Data Reader"
      description: "Read-only access to blobs."
    - role: "Storage Blob Data Contributor"
      description: "Read/Write/Delete access to blobs."
    - role: "Storage Queue Data Message Processor"
      description: "Read and process queue messages."
    - role: "Storage Queue Data Contributor"
      description: "Send, receive, and delete queue messages."
    - role: "Storage Table Data Contributor"
      description: "Read, write, and delete table data."
    - role: "Key Vault Secrets User"
      description: "Read Key Vault secrets."
    - role: "Cognitive Services User"
      description: "Access to Azure AI services (OpenAI, Document Intelligence, etc.)"
    - role: "Foundry User"
      description: "Standard project-level access for AI Foundry agents."
    - role: "Search Index Data Reader"
      description: "Read-only access to AI Search index content."
customer_safe_boundary:
  forbid:
    - "Internal Managed Identity Object IDs"
    - "Tenant IDs"
    - "Subscription IDs"
    - "Raw Access Tokens"
contracts:
  reads: []
  writes: []
  emits: []
