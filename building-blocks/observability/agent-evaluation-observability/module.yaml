name: agent-evaluation-observability
type: guidance
category: observability
status: stable
purpose: Tracing, evaluation, and monitoring expectations for customer-safe agent flows.
inputs:
  - name: telemetry_redaction_rules
    type: object
    description: Explicit rules for what may and must not be traced.
outputs:
  - name: evaluation_checklist
    type: object
    description: Core quality and safety pillars for agent verification.
  - name: trace_event_schema
    type: file
    description: JSON schema for allowlisted technical telemetry.
  - name: trace_checklist
    type: object
    description: Required technical telemetry fields for diagnostics.
non_goals:
  - Implementation of a full monitoring platform.
  - Creation of production dashboards or alerting infrastructure.
  - Implementation of real-time tracing exporters or evaluation runners.
  - Provisioning of Azure Monitor or Foundry resources.
azure_resources:
  - Azure AI Foundry
  - Application Insights
  - Azure Monitor
dependencies:
  - building-blocks/agents/pipeline-assistant-foundry
contracts:
  reads:
    - OpenTelemetry spans
    - Agent traces
  writes:
    - Redacted technical logs
    - Evaluation results
  emits:
    - Quality metrics
    - Safety metrics
    - Diagnostic traces
  references:
    - trace-event.schema.json
    - src/redactor.py
