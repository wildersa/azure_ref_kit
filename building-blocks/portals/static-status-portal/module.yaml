name: static-status-portal
type: portal
category: building-block
status: active
purpose: Minimal read-only status portal shell for displaying customer-safe pipeline outcomes.
version: 1.0.0

runtime:
  language: typescript
  environment: nodejs-18
  dependencies:
    - react
    - vite
    - typescript

build_commands:
  install: "npm install"
  build: "npm run build"
  test: "npm run test"
  lint: "npm run lint"

contracts:
  reads:
    - building-blocks/security/customer-safe-status-boundary/src/schemas/customer_safe_status.schema.json
    - building-blocks/security/customer-safe-status-boundary/src/schemas/friendly_failure.schema.json
    - shared/contracts/pipeline-run.schema.json
    - shared/contracts/pipeline-step.schema.json

inputs:
  - name: name_prefix
    type: string
    description: "A prefix for the name of the Static Web App."
  - name: resource_group_name
    type: string
    description: "The name of the resource group in which to create the Static Web App."
  - name: location
    type: string
    description: "The Azure region where the Static Web App should be created."
  - name: sku_tier
    type: string
    description: "The SKU tier of the Static Web App (Free or Standard)."
  - name: sku_size
    type: string
    description: "The SKU size of the Static Web App (Free or Standard)."
  - name: tags
    type: map
    description: "A mapping of tags to assign to the resource."

outputs:
  - name: static_web_app_id
    type: string
    description: "The ID of the Static Web App."
  - name: static_web_app_name
    type: string
    description: "The name of the Static Web App."
  - name: static_web_app_default_host_name
    type: string
    description: "The default host name of the Static Web App."
  - name: resource_group_name
    type: string
    description: "The name of the resource group."

security_boundary:
  policy: "Enforces customer-safe status boundary via strict API adapter sanitization and defense-in-depth UI rendering."
  forbid_wildcards: true
  forbid_secrets: true

customer_safe_boundary:
  forbid:
    - "Raw Azure Function logs"
    - "Internal exceptions and stack traces"
    - "SAS tokens, connection strings, and storage keys"
    - "System prompts and grounding instructions"
    - "Internal Azure Resource IDs, Tenant IDs, and Subscription IDs"
    - "IaC state files and plans"
    - "storage_ref or internal storage paths"

azure_resources:
  - "Microsoft.Web/staticSites"

deployment_path: building-blocks/portals/static-status-portal/infra/terraform/
