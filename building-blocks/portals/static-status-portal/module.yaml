name: static-status-portal
type: portal
category: building-block
status: active
purpose: Minimal read-only status portal shell for displaying customer-safe pipeline outcomes.
contracts:
  consumes:
    - building-blocks/security/customer-safe-status-boundary/src/schemas/customer_safe_status.schema.json
    - building-blocks/security/customer-safe-status-boundary/src/schemas/friendly_failure.schema.json
security_boundary:
  forbid_wildcards: true
  forbid_secrets: true
customer_safe_boundary:
  forbid:
    - "Raw Azure Function logs"
    - "Internal exceptions and stack traces"
    - "SAS tokens and connection strings"
    - "System prompts"
    - "Internal Azure Resource IDs"
    - "IaC state files"
azure_resources:
  - "Microsoft.Web/staticSites"
deployment_path: building-blocks/portals/static-status-portal/infra/terraform/
