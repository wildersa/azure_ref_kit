name: Deploy Web App Container API (Example)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    outputs:
      image_tag: ${{ steps.build-image.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        id: build-image
        run: |
          IMAGE_NAME=${{ secrets.ACR_NAME }}.azurecr.io/agent-api
          TAG=${{ github.sha }}
          # Note: Reusing Dockerfile from container-agent-api as per module README
          docker build -t $IMAGE_NAME:$TAG -f building-blocks/hosting/container-agent-api/Dockerfile .
          docker push $IMAGE_NAME:$TAG
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  deploy-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: building-blocks/hosting/webapp-agent-api/infra/terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ github.event.inputs.environment }}.webapp-agent-api.tfstate"

      - name: Terraform Plan
        working-directory: building-blocks/hosting/webapp-agent-api/infra/terraform
        run: |
          terraform plan \
            -var="container_image=${{ secrets.ACR_NAME }}.azurecr.io/agent-api:${{ needs.build-and-push.outputs.image_tag }}" \
            -var="docker_registry_url=https://${{ secrets.ACR_NAME }}.azurecr.io" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: building-blocks/hosting/webapp-agent-api/infra/terraform
        run: terraform apply -auto-approve tfplan

  deploy-app:
    needs: [build-and-push, deploy-infra]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.WEBAPP_NAME }}
          images: '${{ secrets.ACR_NAME }}.azurecr.io/agent-api:${{ needs.build-and-push.outputs.image_tag }}'
