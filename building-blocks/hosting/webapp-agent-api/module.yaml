name: webapp-agent-api
type: building-block
category: hosting
status: stable
purpose: Reference for hosting the containerized agent API on Azure App Service.
azure_resources:
  - azurerm_linux_web_app
  - azurerm_service_plan
security_boundary:
  forbid_wildcards: true
  forbid_secrets: true
customer_safe_boundary:
  forbid_raw_logs: true
  forbid_prompts: true
  forbid_provider_payloads: true
  forbid_internal_resource_ids: true
  forbid_storage_keys: true
  forbid_stack_traces: true
  forbid_sas_tokens: true
inputs:
  - name: container_image
    type: string
    description: The container image URI to deploy.
  - name: use_managed_identity_for_registry
    type: boolean
    description: Whether to use the system-assigned identity to pull the container image (set to true for private ACR).
  - name: listen_port
    type: integer
    description: The port the container listens on (default 80 or 8080).
  - name: sku_name
    type: string
    description: The SKU name for the App Service Plan (default B1).
outputs:
  - name: webapp_name
    type: string
    description: The name of the deployed web app.
  - name: resource_group_name
    type: string
    description: The name of the resource group.
  - name: api_endpoint
    type: string
    description: The public URL of the hosted API.
  - name: principal_id
    type: string
    description: The principal ID of the system-assigned managed identity.
contracts:
  reads: []
  writes: []
  receives:
    - type: agent-request
      name: create_request
      description: Receives a controlled agent request (defined in container-agent-api).
      schema:
        $ref: "../container-agent-api/schemas/agent_request.schema.json"
  emits:
    - type: agent-status
      name: agent_status
      description: Returns a customer-safe agent status response (defined in container-agent-api).
      schema:
        $ref: "../container-agent-api/schemas/agent_status_response.schema.json"
