name: webapp-agent-api
type: building-block
category: hosting
status: stable
purpose: Reference for hosting an agent-facing API on Azure App Service/Web App using native Python runtime.
runtime: Python / App Service
azure_resources:
  - azurerm_linux_web_app
  - azurerm_service_plan
security_boundary:
  forbid_wildcards: true
  forbid_secrets: true
customer_safe_boundary:
  forbid_raw_logs: true
  forbid_prompts: true
  forbid_provider_payloads: true
  forbid_internal_resource_ids: true
  forbid_storage_keys: true
  forbid_stack_traces: true
  forbid_sas_tokens: true
inputs:
  - name: python_version
    type: string
    description: The Python version to use (e.g., 3.12, 3.14).
  - name: startup_command
    type: string
    description: Custom startup command for the web app (e.g., gunicorn command).
outputs:
  - name: app_service_url
    type: string
    description: The default FQDN of the deployed web app.
contracts:
  reads: []
  writes: []
  emits: []
