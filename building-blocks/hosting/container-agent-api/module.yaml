name: container-agent-api
type: building-block
category: hosting
status: stable
purpose: Reference for packaging an agent-facing API as a container for Azure Container Apps or App Service.
runtime: python
deploy_target: Azure Container Apps
azure_resources:
  - azurerm_container_app
  - azurerm_container_app_environment
  - azurerm_log_analytics_workspace
dependencies:
  - python >= 3.12
  - fastapi
  - uvicorn
  - pydantic
commands:
  build: "docker build -t container-agent-api ."
  test: "PYTHONPATH=. pytest tests/"
  run: "python src/main.py"
security_boundary:
  forbid_wildcards: true
  forbid_secrets: true
customer_safe_boundary:
  forbid_raw_logs: true
  forbid_prompts: true
  forbid_provider_payloads: true
  forbid_internal_resource_ids: true
  forbid_storage_keys: true
  forbid_stack_traces: true
  forbid_sas_tokens: true
inputs:
  - name: container_image
    type: string
    description: The container image URI to deploy.
  - name: listen_port
    type: integer
    description: The port the container listens on (default 80 or 8080).
outputs:
  - name: api_endpoint
    type: string
    description: The public or internal URL of the hosted API.
contracts:
  reads: []
  writes: []
  receives:
    - type: agent-query
      name: agent_query
      description: Receives a bounded agent query.
      schema:
        $ref: "./schemas/agent_query.schema.json"
  emits:
    - type: agent-query-response
      name: agent_query_response
      description: Returns a customer-safe agent query response.
      schema:
        $ref: "./schemas/agent_query_response.schema.json"
