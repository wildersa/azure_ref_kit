name: agent-tool-http-function
type: building-block
category: functions
description: A minimal Azure Function HTTP endpoint that exposes a controlled read-only agent-tool contract.
version: 1.0.0

runtime:
  language: python
  entrypoint: src.tool:get_resource_info_safe
  dependencies:
    - pydantic>=2.0.0
    - azure-functions

inputs:
  resource_id:
    type: string
    description: The unique identifier for the resource.
    required: true
  resource_type:
    type: string
    description: The type of the resource (virtual_machine, storage_account, database).
    required: true

outputs:
  resource_info:
    type: object
    description: Customer-safe resource information.

security:
  read_only: true
  auth_level: function
  redacted_fields:
    - internal_ids
    - connection_strings
