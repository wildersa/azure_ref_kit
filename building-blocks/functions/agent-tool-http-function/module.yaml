name: agent-tool-http-function
type: building-block
category: functions
status: stable
purpose: Minimal HTTP Azure Function reference for a safe, read-only agent tool boundary.
inputs: []
outputs:
  - name: system_status
    type: http-function-tool
    description: Returns the current operational status of the system.
azure_resources:
  - azurerm_linux_function_app
  - azurerm_service_plan
contracts:
  reads: []
  writes: []
  emits:
    - type: http-function-tool
      description: Returns a safe, filtered summary of system status.
      schema:
        type: object
        properties:
          business_status:
            type: string
            description: Friendly operational status.
          service_health:
            type: string
            description: Technical health indicator.
          active_regions:
            type: array
            items:
              type: string
            description: List of regions currently serving traffic.
          last_updated:
            type: string
            format: date-time
            description: ISO8601 timestamp of the last status update.
          environment:
            type: string
            description: Name of the environment.
        required: [business_status, service_health, active_regions, last_updated, environment]
