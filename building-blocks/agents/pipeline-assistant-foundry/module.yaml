name: pipeline-assistant-foundry
type: azure-ai-foundry-agent
category: agent
status: implemented
purpose: Customer-safe assistant for explaining pipeline execution status and outcomes.
inputs:
  - name: customer_question
    type: string
  - name: run_id
    type: string
outputs:
  - name: grounded_answer
    type: string
  - name: cited_status_sources
    type: array
allowed_tools:
  - get_pipeline_status
  - get_pipeline_steps
  - get_artifacts
  - explain_error
  - estimate_cost
  - request_human_review
azure_resources:
  - Azure AI Foundry
  - Application Insights
contracts:
  reads:
    - shared/contracts/pipeline-run.schema.json
    - shared/contracts/pipeline-step.schema.json
    - shared/contracts/artifact.schema.json
    - shared/contracts/cost-ledger.schema.json
  defines:
    - building-blocks/agents/pipeline-assistant-foundry/contracts/tool-definitions.json
customer_safe_boundary:
  policy: "Strictly forbids exposure of technical logs, internal IDs, secrets, and raw provider payloads."
  enforcement: "System instructions (src/agent_definition.py) and Portal API filtering."
