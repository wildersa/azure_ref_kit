name: blob-artifact-store
type: storage
category: artifacts
status: implemented
purpose: Store input, intermediate, and output artifacts for pipeline executions.
inputs:
  - name: artifact_content
    description: "Raw binary content of the artifact to store."
    type: bytes
  - name: artifact_metadata
    description: "Dictionary of metadata including kind, safe_name, and visibility."
    type: object
  - name: ARTIFACT_STORE_BLOB_ENDPOINT
    description: "Primary blob service endpoint (environment variable)."
    type: string
outputs:
  - name: artifact_reference
    description: "A customer-safe Artifact reference conforming to artifact.schema.json."
    type: object
azure_resources:
  - Blob Storage
contracts:
  emits:
    - shared/contracts/artifact.schema.json
