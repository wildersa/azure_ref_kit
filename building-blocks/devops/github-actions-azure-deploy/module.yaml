name: github-actions-azure-deploy
type: devops
category: devops
status: reference
purpose: Secure GitHub Actions deployment reference patterns for Azure services (SWA, APIM AI Gateway, Web App Agent API) using OIDC and federated identity.
inputs:
  - name: AZURE_CLIENT_ID
    description: "Client ID of the Microsoft Entra application or User-Assigned Managed Identity for OIDC authentication."
    type: secret
  - name: AZURE_TENANT_ID
    description: "Tenant ID of the Azure tenant."
    type: secret
  - name: AZURE_SUBSCRIPTION_ID
    description: "Subscription ID of the target Azure subscription."
    type: secret
  - name: AZURE_STATIC_WEB_APPS_API_TOKEN
    description: "Deployment token for Azure Static Web Apps. Used when OIDC is not exclusively used for the SWA upload action."
    type: secret
    required: false
  - name: ENVIRONMENT_NAME
    description: "The name of the GitHub Environment for deployment gating and approvals."
    type: string
    required: false
  - name: BACKEND_RESOURCE_GROUP_NAME
    description: "The resource group name for the Terraform remote backend."
    type: secret
    required: false
  - name: BACKEND_STORAGE_ACCOUNT_NAME
    description: "The storage account name for the Terraform remote backend."
    type: secret
    required: false
  - name: BACKEND_CONTAINER_NAME
    description: "The container name for the Terraform remote backend."
    type: secret
    required: false
  - name: BACKEND_KEY
    description: "The state file key for the Terraform remote backend."
    type: secret
    required: false
  - name: RESOURCE_GROUP_NAME
    description: "The name of the target Azure resource group (APIM)."
    type: string
    required: false
  - name: LOCATION
    description: "Azure region for deployment."
    type: string
    required: false
  - name: APIM_NAME
    description: "Name of the APIM instance."
    type: string
    required: false
  - name: RESOURCE_PREFIX
    description: "Prefix for resources (Web App Agent API)."
    type: string
    required: false
  - name: CONTAINER_IMAGE
    description: "The container image to deploy (Web App Agent API)."
    type: string
    required: false
  - name: CONTAINER_REGISTRY_SERVER
    description: "The FQDN of the container registry (Web App Agent API)."
    type: string
    required: false
  - name: CONTAINER_REGISTRY_ID
    description: "The ID of the Azure Container Registry (Web App Agent API)."
    type: string
    required: false
  - name: AUTH_CLIENT_ID
    description: "The Client ID for Entra ID authentication (Web App Agent API)."
    type: string
    required: false
outputs:
  - name: static_web_app_url
    description: "The URL of the deployed Static Web App."
  - name: gateway_url
    description: "The base URL of the deployed AI Gateway."
  - name: webapp_api_endpoint
    description: "The default hostname of the deployed Web App Agent API."
security_boundary:
  forbid_wildcards: true
  forbid_secrets: true
customer_safe_boundary:
  forbid:
    - "Azure Service Principal secrets, passwords, or certificates"
    - "Short-lived OIDC tokens or JWTs"
    - "Static Web Apps deployment tokens/publish profiles"
    - "Internal Azure resource identifiers (Subscription/Tenant IDs) in logs"
    - "Detailed technical logs from the build and deployment process"
    - "Environment variables containing technical internals"
