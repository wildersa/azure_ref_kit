name: azure-functions-mcp-endpoint
type: building-block
category: mcp
status: implemented
purpose: Reference implementation for hosting Model Context Protocol (MCP) servers on Azure Functions using the MCP binding extension.
inputs: []
outputs:
  - name: get_service_info_response
    type: object
    description: "Response from the get_service_info tool."
    contract: "read-only"
dependencies:
  - python >= 3.10
  - azure-functions >= 1.24.0
azure_resources:
  - azurerm_function_app_flex_consumption
  - azurerm_storage_account
contracts:
  reads: []
  writes: []
  emits:
    - type: mcp-tool
      name: get_service_info
      description: Returns a safe, filtered summary of the MCP service status.
customer_safe_boundary:
  policy: "Read-only access to mock service metadata. No access to real PII, secrets, or technical internals."
  enforcement: "Azure Functions MCP decorator-based tool registration and explicit field filtering."
