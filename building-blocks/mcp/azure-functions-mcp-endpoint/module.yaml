name: azure-functions-mcp-endpoint
type: building-block
category: mcp
status: implemented
purpose: Reference implementation for hosting Model Context Protocol (MCP) servers on Azure Functions using the MCP binding extension.
deployment_iac: "infra/terraform/"
inputs:
  - name: prefix
    type: string
    description: "Prefix for naming resources."
    default: "mcp-af"
  - name: location
    type: string
    description: "Azure region for deployment."
    default: "East US"
  - name: resource_group_name
    type: string
    description: "Optional: Existing resource group name."
outputs:
  - name: get_synthetic_resource_response
    type: object
    description: "Response from the get_synthetic_resource tool. Example: {'id': 'comp-001', 'type': 'Standard_DS1_v2', 'status': 'running', 'region': 'local-synth-1'}"
    contract: "read-only"
dependencies:
  - python >= 3.10
  - azure-functions >= 1.24.0
azure_resources:
  - azurerm_function_app_flex_consumption
  - azurerm_storage_account
  - azurerm_service_plan
  - azurerm_user_assigned_identity
  - azurerm_log_analytics_workspace
  - azurerm_application_insights
  - azurerm_role_assignment
contracts:
  reads: []
  writes: []
  emits:
    - type: mcp-tool
      name: get_synthetic_resource
      description: Returns synthetic metadata for a requested resource type.
customer_safe_boundary:
  policy: "Read-only access to mock resource metadata. No access to real PII, secrets, or technical internals."
  enforcement: "Azure Functions MCP decorator-based tool registration, explicit field filtering, and strict argument validation."
security_boundary: "Managed Identity for storage; disabled shared access keys; MCP system key protection."
