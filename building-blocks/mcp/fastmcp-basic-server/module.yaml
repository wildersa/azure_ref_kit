name: fastmcp-basic-server
type: building-block
category: mcp
status: stable
purpose: Minimal local MCP server reference using FastMCP to demonstrate the protocol boundary.
inputs: []
outputs:
  - name: api_endpoint
    type: string
    description: "Standardized output name for hosting blocks, set to 'local' for this reference."
dependencies:
  - python >= 3.10
  - fastmcp >= 3.4.4
azure_resources: []
contracts:
  reads: []
  writes: []
  emits:
    - type: mcp-tool
      name: get_synthetic_resource
      description: Returns synthetic metadata for a requested resource type.
customer_safe_boundary:
  policy: "Read-only access to mock resource metadata. No access to real PII, secrets, or mutation operations."
  enforcement: "FastMCP decorator-based tool registration, structured Pydantic output models, Literal type hints, and explicit value validation in server.py."
  security_boundary: "Local process boundary using stdio transport. No network ingress."
