name: fastmcp-basic-server
type: building-block
category: mcp
status: implemented
purpose: Minimal local MCP server reference using FastMCP to demonstrate the protocol boundary.
inputs: []
outputs: []
dependencies:
  - python >= 3.10
  - fastmcp >= 3.4.3
azure_resources: []
contracts:
  emits:
    - type: mcp-tool
      name: get_system_status
      description: Returns the general operational status of the MCP server.
    - type: mcp-tool
      name: get_service_health
      description: Returns the health status of a specific internal service.
customer_safe_boundary:
  policy: "Read-only access to mock system metadata. No access to real PII, secrets, or mutation operations."
  enforcement: "FastMCP decorator-based tool registration and bounded input validation in server.py."
