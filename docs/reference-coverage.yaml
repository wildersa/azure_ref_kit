schema_version: 1
last_reviewed: "2026-07-18"

continuous_discovery:
  purpose: >-
    Keep Azure Reference Kit evolving as a broad Azure AI reference library, not only
    as an agent implementation queue.
  source_priority:
    - Microsoft Learn and product documentation
    - Azure Architecture Center
    - Azure Samples and official Microsoft GitHub repositories
    - Mature external repositories and public reference solutions
  when_queue_empty:
    - Read docs/catalog.json and this coverage map before proposing new work.
    - Select a domain with coverage none or partial, prioritizing clear reusable gaps.
    - Research current official sources first, then inspect mature external examples when useful.
    - Record one to three bounded candidates with sources, rationale, priority, and status.
    - Open only one immediately executable implementation issue unless independent capacity is explicit.
    - Update the candidate status and issue number when work starts, then record the implemented path after merge.
  selection_rules:
    - Cover the full Azure AI ecosystem, not only agents.
    - Prefer a reusable building block or a small composed solution with observable value.
    - Adapt external ideas to repository contracts; do not copy implementations without reviewing license, security, and Azure fit.
    - Do not repeat a rejected candidate unless its status is changed to revisit with a new reason.
    - Prefer missing capabilities over another variant of an already well-covered example.

