schema_version: 1
last_updated: "2026-07-19"

statuses:
  active:
    - hypothesis
    - researched
    - shortlisted
    - approved
    - implementing
    - implemented
  terminal:
    - rejected
    - superseded
    - parked

entry_contract:
  purpose: >-
    Keep a short navigational summary for every full opportunity document without
    duplicating its research, architecture, risks, or fit rationale.
  required_fields:
    - id
    - title
    - segment
    - summary
    - intelligent_capability
    - ai_dependency
    - fit_score
    - complexity
    - status
    - document
  summary_rule: One concrete sentence describing the problem, proposed solution, and material intelligent capability.
  summary_max_words: 40
  allowed_ai_dependency:
    - supporting
    - core

opportunities:
  - id: CROSS-001
    title: AI-assisted cross-system offboarding risk control plane
    segment: cross-industry
    summary: Organizations with fragmented offboarding can orchestrate known revocations and use access-graph anomaly detection to identify likely residual accounts, privileges, assets, and missing controls for human review.
    intelligent_capability: Identity and access graph anomaly detection with risk-ranked reconciliation
    ai_dependency: core
    fit_score: 89
    complexity: large
    status: researched
    document: segments/cross-industry/CROSS-001-offboarding-control-plane.md
  - id: HR-001
    title: AI skills-evidence graph for internal mobility and reskilling
    segment: human-resources
    summary: Organizations can convert employee-approved work evidence into a governed skills graph that identifies capability gaps, ranks internal transition paths, and recommends targeted reskilling without making autonomous employment decisions.
    intelligent_capability: Evidence-grounded skill extraction, taxonomy mapping, gap inference, and internal transition-path ranking
    ai_dependency: core
    fit_score: 89
    complexity: large
    status: researched
    document: segments/human-resources/HR-001-skills-evidence-mobility-graph.md
  - id: FIN-001
    title: Real-time Pix scam and mule-account intervention with MED intelligence
    segment: financial-services
    summary: Brazilian Pix participants can combine Banco Central security signals, transaction behavior, device context, and payment graphs to detect scams and contas laranja, apply proportionate controls, and prioritize MED investigation before funds disperse.
    intelligent_capability: Calibrated Pix scam-risk prediction and graph-based conta-laranja and fund-dispersion detection
    ai_dependency: core
    fit_score: 92
    complexity: large
    status: researched
    document: segments/financial-services/FIN-001-app-scam-intervention.md
  - id: HEALTH-001
    title: AI-assisted SUS specialist-access and queue orchestration
    segment: healthcare
    summary: Brazilian SUS regulation centers can combine protocol rules with demand, capacity, geography, wait-time, cancellation, and clinical-context models to recommend equitable specialist-access queues and recover unused appointment capacity under human control.
    intelligent_capability: Constrained demand-capacity forecasting, no-show prediction, and protocol-aware queue and slot recommendation
    ai_dependency: core
    fit_score: 88
    complexity: large
    status: researched
    document: segments/healthcare/HEALTH-001-sus-specialist-access-orchestration.md
  - id: RETAIL-001
    title: AI-assisted shelf-availability and retail-loss orchestration
    segment: retail-ecommerce
    summary: Brazilian retailers can combine shelf images, inventory, sales, replenishment, and loss events to detect operational rupture and shrinkage anomalies, rank corrective store tasks, and verify execution under human control.
    intelligent_capability: Multimodal shelf-state recognition with inventory-loss anomaly detection and intervention ranking
    ai_dependency: core
    fit_score: 89
    complexity: large
    status: researched
    document: segments/retail-ecommerce/RETAIL-001-shelf-availability-loss-orchestration.md
  - id: ENERGY-001
    title: AI-assisted water-leak detection and field verification
    segment: energy-utilities
    summary: Brazilian water utilities can use acoustic and hydraulic anomaly models to rank suspected hidden leaks, direct field verification, and measure recovered water while retaining geophone confirmation and cost-benefit controls.
    intelligent_capability: Acoustic leak classification and hydraulic anomaly ranking with human-confirmed localization
    ai_dependency: core
    fit_score: 87
    complexity: medium
    status: researched
    document: segments/energy-utilities/ENERGY-001-ai-assisted-water-leak-detection.md
  - id: TELCO-001
    title: AI-assisted network incident correlation and dispatch triage
    segment: telecommunications
    summary: Brazilian telecom NOCs can correlate alarms, topology, performance, tickets, and customer-impact signals to rank likely root causes, recommend safe runbooks, and avoid unnecessary field dispatches under engineer approval.
    intelligent_capability: Topology-aware alarm correlation, incident clustering, root-cause ranking, and dispatch-necessity prediction
    ai_dependency: core
    fit_score: 86
    complexity: large
    status: hypothesis
    document: segments/telecommunications/TELCO-001-ai-assisted-network-incident-correlation.md
