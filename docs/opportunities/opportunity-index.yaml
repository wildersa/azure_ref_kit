    segment: cross-industry
    summary: Organizations with fragmented offboarding can orchestrate known revocations and use access-graph anomaly detection to identify likely residual accounts, privileges, assets, and missing controls for human review.
    intelligent_capability: Identity and access graph anomaly detection with risk-ranked reconciliation
    ai_dependency: core
    fit_score: 89
    complexity: large
    status: researched
    document: segments/cross-industry/CROSS-001-offboarding-control-plane.md
