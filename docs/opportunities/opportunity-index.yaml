schema_version: 1
last_updated: "2026-07-18"

statuses:
  active:
    - hypothesis
    - researched
    - shortlisted
    - approved
    - implementing
    - implemented
  terminal:
    - rejected
    - superseded
    - parked

entry_contract:
  purpose: >-
    Keep a short navigational summary for every full opportunity document without
    duplicating its research, architecture, risks, or fit rationale.
  required_fields:
    - id
    - title
    - segment
    - summary
    - intelligent_capability
    - ai_dependency
    - fit_score
    - complexity
    - status
    - document
  summary_rule: One concrete sentence describing the problem, proposed solution, and material intelligent capability.
  summary_max_words: 40
  allowed_ai_dependency:
    - supporting
    - core

opportunities:
