    title: Cross-system offboarding control plane
    segment: cross-industry
    summary: Organizations with fragmented offboarding can coordinate HR events, account revocation, asset return, physical access, evidence, and overdue exceptions through one auditable control plane.
    fit_score: 87
    complexity: medium
    status: researched
    document: segments/cross-industry/CROSS-001-offboarding-control-plane.md
