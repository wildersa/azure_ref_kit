schema_version: 1

radar:
  mode: round-robin
  opportunities_per_run: 1
  allow_no_new_fit: true
  minimum_fit_to_publish: 55
  minimum_sources: 1
  minimum_distinct_problem_themes_before_no_new_fit: 3
  prefer_multiple_source_types: true
  implementation_issue_creation: disabled
  return_to_first_segment_after_cycle: true

market_context:
  default_primary_market: Brazil
  default_jurisdiction: Brazil
  current_date_from_runtime: true
  search_languages: [pt-BR, en]
  require_brazil_problem_evidence: true
  require_current_brazil_regulatory_context_for_regulated_segments: true
  minimum_brazilian_load_bearing_sources: 1
  current_evidence_window_months: 18
  foreign_sources_role: secondary-comparison-and-technical-support
  older_sources_role: historical-or-stable-background-only
  reject_foreign_only_problem_evidence: true
  reject_imported_foreign_legal_assumptions: true

research:
  require_current_web_research: true
  source_priority:
    - brazilian-regulators-public-institutions-and-official-statistics
    - brazilian-industry-associations-sector-research-public-tenders-and-local-cases
    - official-platform-product-api-and-roadmap-documentation
    - current-commercial-sector-and-open-source-solution-documentation
    - current-international-regulators-standards-and-technical-research
    - operational-guides-public-tenders-and-incident-reports
    - academic-and-technical-research
    - reputable-reporting
  reject_marketing_only_problem_evidence: true
  allow_vendor_or_case_evidence_for_solution_plausibility_when_labeled: true
  record_queries: true
  record_sources: true
  distinguish_fact_from_inference: true
  separate_problem_evidence_from_solution_evidence: true
  require_counter_evidence_search: true
  counter_evidence_is_design_input_not_default_rejection: true
  absence_of_production_evidence_is_not_rejection: true
  absence_of_brazilian_solution_validation_is_not_rejection: true

existing_solution_landscape:
  required: true
  require_current_official_platform_search: true
  require_current_product_and_vendor_search: true
  require_public_roadmap_and_release_note_review_when_available: true
  require_open_source_search_when_relevant: true
  require_api_and_integration_documentation_review_when_available: true
  required_disposition:
    - build
    - extend
    - integrate
    - adopt
    - no-new-fit
  require_current_capability_summary: true
  require_actor_process_capability_outcome_overlap_analysis: true
  require_material_uncovered_gap: true
  require_differentiation_statement: true
  reject_new_solution_framing_when_core_solution_exists: true
  cloud_model_vendor_or_ui_change_is_not_differentiation: true
  generic_agent_rag_clustering_dashboard_or_ranking_is_not_differentiation: true
  roadmap_capability_counts_as_existing_landscape: true
  adoption_is_valid_no_new_fit_outcome: true

intelligence_requirement:
  required: true
  allowed_ai_dependency: [supporting, core]
  forbidden_ai_dependency: [none, optional]
  allowed_capability_families:
    - machine-learning-training
    - fine-tuning
    - generative-ai
    - agents-and-tool-use
    - retrieval-augmented-generation
    - speech-recognition-and-synthesis
    - computer-vision
    - document-recognition-and-extraction
    - classification-and-entity-extraction
    - anomaly-detection
    - prediction-and-forecasting
    - recommendation-and-ranking
    - optimization-and-reinforcement-learning
    - multimodal-models
    - other-explicit-model-based-capability
  require_business_necessity: true
  require_inputs_and_outputs: true
  require_evaluation_plan: true
  require_deterministic_or_human_fallback: true
  require_explicit_ai_role_map: true
  forbid_decorative_ai: true

publication:
  default_new_status: hypothesis
  require_specific_actor: true
  require_specific_process: true
  require_primary_market_and_jurisdiction: true
  require_brazil_applicability_section: true
  require_problem_evidence: true
  require_recent_brazilian_evidence: true
  require_existing_solutions_and_differentiation_section: true
  require_build_extend_integrate_adopt_or_no_new_fit_disposition: true
  require_material_uncovered_gap: true
  require_solution_evidence_level: true
  require_operational_maturity: true
  require_counter_evidence_section: true
  require_non_ai_and_existing_product_baseline: true
  require_data_assumptions: true
  require_bounded_prototype_scope: true
  require_validation_metrics: true
  require_failure_or_redesign_criteria: true
  require_macro_mermaid_architecture: true
  require_material_intelligent_capability: true
  require_possible_gains: true
  require_risks_and_constraints: true
  require_fit_breakdown: true
  require_duplicate_keys: true
  forbid_unsubstantiated_percentages: true
  production_evidence_required: false
  brazilian_solution_case_required: false
  proven_roi_required: false
  completed_integration_required: false

solution_evidence_levels: [conceptual, prototype, pilot, production, repeated-production]
operational_maturity_levels: [unvalidated, early, proven]

confidence_rules:
  low: plausible differentiated hypothesis with major unknowns
  medium: differentiated hypothesis supported by technical research, comparable patterns, prototype, or pilot evidence
  high: supported by credible comparable production evidence and realistic data readiness

fit_guardrails:
  technical_feasibility_means_prototype_testability: true
  minimum_technical_feasibility_to_publish: 8
  no_production_evidence_score_cap: disabled
  deterministic_baseline_is_comparison_not_rejection: true
  unresolved_unknowns_reduce_confidence_not_automatic_fit: true
  core_existing_solution_overlap_without_material_gap_max_strategic_differentiation: 4
  core_existing_solution_overlap_without_material_gap_max_total_fit: 54
  invalid_new_solution_framing_requires_reject_or_reframe: true
  core_mechanism_invalidated_without_mitigation_max_technical_feasibility: 7
  core_mechanism_invalidated_without_mitigation_max_total_fit: 54

valid_no_new_fit_reasons:
  - no-current-brazilian-problem-evidence
  - duplicate-of-existing-repository-opportunity
  - duplicate-of-current-official-commercial-sector-or-open-source-solution
  - existing-platform-adoption-or-extension-is-sufficient
  - no-material-uncovered-gap
  - decorative-or-unnecessary-ai
  - no-plausible-data-model-integration-simulation-or-prototype-path
  - central-mechanism-invalidated-without-credible-mitigation
  - generic-candidate-cannot-be-narrowed

invalid_no_new_fit_reasons:
  - no-brazilian-production-deployment
  - no-local-false-positive-rate
  - roi-not-yet-proven
  - labels-integration-cost-or-adoption-still-unknown
  - deterministic-baseline-exists
  - prototype-still-required

fit_dimensions:
  - {id: problem-evidence, max_score: 20}
  - {id: business-value, max_score: 20}
  - {id: technical-feasibility, max_score: 20}
  - {id: reuse-potential, max_score: 20}
  - {id: strategic-differentiation, max_score: 20}

segments:
  - {id: cross-industry, name: Cross-industry and shared operations, enabled: true}
  - {id: human-resources, name: Human resources and people operations, enabled: true}
  - {id: financial-services, name: Banking insurance payments and financial services, enabled: true}
  - {id: healthcare, name: Healthcare clinics hospitals and life sciences, enabled: true}
  - {id: retail-ecommerce, name: Retail commerce and consumer services, enabled: true}
  - {id: manufacturing, name: Manufacturing and industrial operations, enabled: true}
  - {id: logistics-transport, name: Logistics transport warehousing and mobility, enabled: true}
  - {id: agriculture, name: Agriculture livestock and agribusiness, enabled: true}
  - {id: construction-real-estate, name: Construction engineering and real estate, enabled: true}
  - {id: energy-utilities, name: Energy utilities water and environmental services, enabled: true}
  - {id: telecommunications, name: Telecommunications and network operations, enabled: true}
  - {id: education, name: Education training and workforce development, enabled: true}
  - {id: public-sector, name: Public sector and citizen services, enabled: true}
  - {id: professional-services, name: Legal accounting consulting and professional services, enabled: true}
  - {id: hospitality-tourism, name: Hospitality tourism food service and events, enabled: true}
  - {id: media-entertainment, name: Media entertainment sports and creative industries, enabled: true}
  - {id: technology-software, name: Technology software cloud and digital platforms, enabled: true}
  - {id: nonprofit, name: Nonprofit associations and social impact organizations, enabled: true}