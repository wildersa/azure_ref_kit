schema_version: 1

radar:
  mode: round-robin
  opportunities_per_run: 1
  allow_no_new_fit: true
  minimum_fit_to_publish: 55
  minimum_sources: 1
  prefer_multiple_source_types: true
  implementation_issue_creation: disabled
  return_to_first_segment_after_cycle: true

market_context:
  default_primary_market: Brazil
  default_jurisdiction: Brazil
  current_date_from_runtime: true
  search_languages:
    - pt-BR
    - en
  require_brazil_problem_evidence: true
  require_current_brazil_regulatory_context_for_regulated_segments: true
  minimum_brazilian_load_bearing_sources: 1
  current_evidence_window_months: 18
  foreign_sources_role: secondary-comparison-and-technical-support
  older_sources_role: historical-or-stable-background-only
  allow_global_opportunity_only_with_explicit_brazil_applicability: true
  reject_foreign_only_problem_evidence: true
  reject_imported_foreign_legal_assumptions: true

research:
  require_current_web_research: true
  source_priority:
    - brazilian-regulators-public-institutions-and-official-statistics
    - brazilian-industry-associations-sector-research-public-tenders-and-local-cases
    - current-international-regulators-standards-and-technical-research
    - operational-guides-public-tenders-and-incident-reports
    - academic-and-technical-research
    - mature-open-source-projects-and-reference-architectures
    - reputable-reporting
  reject_marketing_only_evidence: true
  record_queries: true
  record_sources: true
  record_publication_data_period_and_effective_dates: true
  distinguish_fact_from_inference: true
  separate_problem_evidence_from_solution_evidence: true
  require_counter_evidence_search: true
  require_comparable_deployment_review_when_public: true
  require_favorable_and_contrary_solution_evidence: true
  counter_evidence_search_languages:
    - pt-BR
    - en
  counter_evidence_search_concepts:
    - failed
    - cancelled
    - discontinued
    - rollback
    - pilot-results
    - accuracy-limitations
    - false-positives
    - low-adoption
    - operating-cost
    - falhou
    - cancelado
    - descontinuado
    - resultados-de-piloto
    - limitacoes-de-precisao
    - falsos-positivos
    - baixa-adocao
    - custo-operacional

intelligence_requirement:
  required: true
  allowed_ai_dependency:
    - supporting
    - core
  forbidden_ai_dependency:
    - none
    - optional
  allowed_capability_families:
    - machine-learning-training
    - fine-tuning
    - generative-ai
    - agents-and-tool-use
    - retrieval-augmented-generation
    - speech-recognition-and-synthesis
    - computer-vision
    - document-recognition-and-extraction
    - classification-and-entity-extraction
    - anomaly-detection
    - prediction-and-forecasting
    - recommendation-and-ranking
    - optimization-and-reinforcement-learning
    - multimodal-models
    - other-explicit-model-based-capability
  require_business_necessity: true
  require_inputs_and_outputs: true
  require_evaluation_plan: true
  require_deterministic_or_human_fallback: true
  forbid_decorative_ai: true

publication:
  require_specific_actor: true
  require_specific_process: true
  require_primary_market_and_jurisdiction: true
  require_brazil_applicability_section: true
  require_problem_evidence: true
  require_recent_brazilian_evidence: true
  require_solution_evidence_level: true
  require_operational_maturity: true
  require_counter_evidence_section: true
  require_non_ai_baseline: true
  require_data_readiness_assessment: true
  require_unit_economics_hypothesis: true
  require_bounded_pilot_scope: true
  require_success_criteria: true
  require_kill_criteria: true
  require_macro_mermaid_architecture: true
  require_material_intelligent_capability: true
  require_possible_gains: true
  require_measurable_metrics: true
  require_risks_and_constraints: true
  require_fit_breakdown: true
  require_duplicate_keys: true
  forbid_unsubstantiated_percentages: true

solution_evidence_levels:
  - conceptual
  - prototype
  - pilot
  - production
  - repeated-production

operational_maturity_levels:
  - unvalidated
  - early
  - proven

fit_guardrails:
  minimum_technical_feasibility_for_non_research_publish: 10
  no_comparable_production_evidence_max_technical_feasibility: 12
  announcement_demo_or_unmeasured_pilot_max_technical_feasibility: 10
  unmitigated_comparable_failure_max_technical_feasibility: 8
  unmitigated_comparable_failure_max_total_fit: 69
  high_confidence_requires_comparable_production_evidence: true
  high_confidence_requires_realistic_data_readiness: true
  high_confidence_forbidden_with_unresolved_comparable_failure: true
  large_or_research_complexity_requires_operational_maturity_rationale: true
  technical_feasibility_below_minimum_allowed_only_for_research_bet: true
  problem_business_reuse_and_differentiation_cannot_override_feasibility_cap: true

fit_dimensions:
  - id: problem-evidence
    max_score: 20
  - id: business-value
    max_score: 20
  - id: technical-feasibility
    max_score: 20
  - id: reuse-potential
    max_score: 20
  - id: strategic-differentiation
    max_score: 20

segments:
  - id: cross-industry
    name: Cross-industry and shared operations
    enabled: true
  - id: human-resources
    name: Human resources and people operations
    enabled: true
  - id: financial-services
    name: Banking, insurance, payments, and financial services
    enabled: true
  - id: healthcare
    name: Healthcare, clinics, hospitals, and life sciences
    enabled: true
  - id: retail-ecommerce
    name: Retail, commerce, and consumer services
    enabled: true
  - id: manufacturing
    name: Manufacturing and industrial operations
    enabled: true
  - id: logistics-transport
    name: Logistics, transport, warehousing, and mobility
    enabled: true
  - id: agriculture
    name: Agriculture, livestock, and agribusiness
    enabled: true
  - id: construction-real-estate
    name: Construction, engineering, and real estate
    enabled: true
  - id: energy-utilities
    name: Energy, utilities, water, and environmental services
    enabled: true
  - id: telecommunications
    name: Telecommunications and network operations
    enabled: true
  - id: education
    name: Education, training, and workforce development
    enabled: true
  - id: public-sector
    name: Public sector and citizen services
    enabled: true
  - id: professional-services
    name: Legal, accounting, consulting, and professional services
    enabled: true
  - id: hospitality-tourism
    name: Hospitality, tourism, food service, and events
    enabled: true
  - id: media-entertainment
    name: Media, entertainment, sports, and creative industries
    enabled: true
  - id: technology-software
    name: Technology, software, cloud, and digital platforms
    enabled: true
  - id: nonprofit
    name: Nonprofit, associations, and social impact organizations
    enabled: true