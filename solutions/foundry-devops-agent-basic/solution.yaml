purpose: Minimal reference solution for an Azure AI Foundry agent answering safe pipeline/build status questions through a controlled MCP tool boundary.
entrypoints:
  cli: solutions/foundry-devops-agent-basic/src/main.py
  sdk_invocation: solutions/foundry-devops-agent-basic/src/adapter.py
building_blocks:
  - building-blocks/agents/pipeline-assistant-foundry/
  - building-blocks/mcp/devops-mcp-tool-contract/
