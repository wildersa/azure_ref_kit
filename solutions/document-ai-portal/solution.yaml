name: document-ai-portal
status: partial
purpose: "A customer-facing portal for monitoring and interacting with a Document AI pipeline, featuring OCR extraction and an AI assistant."

entrypoints:
  blob_upload:
    description: "Pipeline starts when a document is uploaded to the input container."
    target: building-blocks/functions/blob-trigger-start-pipeline/
  portal_ui:
    description: "Customer accesses the portal to view status and ask questions."
    target: building-blocks/portals/static-status-portal/

building_blocks:
  - id: static-status-portal
    path: building-blocks/portals/static-status-portal/
    role: portal
    status: scaffold
    deploy_target: portal
  - id: portal-api-functions
    path: building-blocks/functions/portal-api-functions/
    role: api
    status: implemented
    deploy_target: api_function_app
  - id: blob-trigger-start-pipeline
    path: building-blocks/functions/blob-trigger-start-pipeline/
    role: worker
    status: implemented
    deploy_target: pipeline_function_app
  - id: blob-artifact-store
    path: building-blocks/storage/blob-artifact-store/
    role: security
    status: implemented
    deploy_target: storage
  - id: durable-basic-pipeline
    path: building-blocks/pipelines/durable-basic-pipeline/
    role: worker
    status: implemented
    deploy_target: pipeline_function_app
  - id: ocr-document-intelligence
    path: building-blocks/functions/ocr-document-intelligence/
    role: worker
    status: implemented
    deploy_target: pipeline_function_app
  - id: field-validation-worker
    path: building-blocks/functions/field-validation-worker/
    role: worker
    status: implemented
    deploy_target: pipeline_function_app
  - id: final-result-publisher
    path: building-blocks/functions/final-result-publisher/
    role: worker
    status: implemented
    deploy_target: pipeline_function_app
  - id: pipeline-assistant-foundry
    path: building-blocks/agents/pipeline-assistant-foundry/
    role: api
    status: implemented
    deploy_target: none
  - id: appinsights-observability
    path: building-blocks/observability/appinsights-observability/
    role: observer
    status: scaffold
    deploy_target: none
  - id: cost-ledger-capture
    path: building-blocks/observability/cost-ledger-capture/
    role: observer
    status: scaffold
    deploy_target: none

infra:
  - solutions/document-ai-portal/infra/terraform/

contracts:
  - shared/contracts/pipeline-run.schema.json
  - shared/contracts/pipeline-step.schema.json
  - shared/contracts/artifact.schema.json
  - shared/contracts/cost-ledger.schema.json

inputs:
  - name: document_blob
    description: "The source document uploaded by the customer."
    type: blob
  - name: customer_id
    description: "Identifier for the customer owning the document."
    type: string

outputs:
  - name: customer_portal_url
    description: "The URL of the deployed Static Web App portal."
    type: string
  - name: extracted_data
    description: "The structured data extracted from the document."
    type: object
  - name: agent_answer
    description: "Response from the pipeline assistant agent."
    type: string
